# Paper benchmark: TUM-VI (Schubert et al. 2018), Stereo-Inertial mode (Room seqs).
# TUM-VI ships in EuRoC/ASL layout (mav0/cam0|cam1/data, mav0/imu0/data.csv,
# mav0/mocap0/data.csv) but with FISHEYE (equidistant) cameras, so we drive it
# through the generic image_folder source + [input.imu] + an explicit fisheye
# [rig]. Ground truth is the mocap0 stream (same column order as EuRoC GT).
#
# IMPORTANT: the calibration below is the published TUM-VI 512x16 camchain.
# Verify/replace it with the exact values from your download's
# camchain-imucam-*.yaml and imu config before trusting the numbers.
#
# Download: https://cvg.cit.tum.de/data/datasets/visual-inertial-dataset

[run]
verbosity = 1

[input]
type = "image_folder"
root = "datasets/tumvi/dataset-room1_512_16/mav0"

  [[input.cameras]]
  images = "cam0/data/*.png"

  [[input.cameras]]
  images = "cam1/data/*.png"

  [input.timestamps]
  mode = "filename"                # TUM-VI frames are <timestamp_ns>.png
  unit = "ns"

  [input.imu]
  path = "imu0/data.csv"
  format = "euroc"                 # timestamp[ns], wx,wy,wz, ax,ay,az

[odometry]
odometry_mode = "Inertial"
rectified_stereo_camera = false
async_sba = false
enable_final_landmarks_export = true

# ---- TUM-VI 512x16 calibration (cam0 = rig origin) — VERIFY against your yaml ----
[[rig.cameras]]
size = [512, 512]
focal = [190.97847, 190.97331]
principal = [254.93171, 256.89744]
  [rig.cameras.distortion]
  model = "Fisheye"               # equidistant (k1..k4)
  parameters = [0.00348239, 0.00071503, -0.00205324, 0.00020294]

[[rig.cameras]]
size = [512, 512]
focal = [190.44237, 190.43444]
principal = [252.59666, 254.91793]
  [rig.cameras.rig_from_camera]
  translation = [0.10107054, 0.0, 0.0]   # ~0.101 m baseline; replace w/ exact T_cam0_cam1
  rotation = [0.0, 0.0, 0.0, 1.0]
  [rig.cameras.distortion]
  model = "Fisheye"
  parameters = [0.00340032, 0.00176623, -0.00266166, 0.00095164]

[rig.imu]
gyroscope_noise_density = 0.00016
accelerometer_noise_density = 0.0028
gyroscope_random_walk = 0.000022
accelerometer_random_walk = 0.00086
frequency = 200.0

[output]
trajectory = "out/tumvi_room1_tum.txt"
timestamp_unit = "ns"

[eval]
ground_truth = "mocap0/data.csv"   # TUM-VI mocap, EuRoC column order
gt_format = "euroc"
align = "se3"
apply_gt_extrinsic = "none"        # mocap frame; rigid alignment handles the offset
rpe_distances = [1, 2, 4, 8]
report = "out/tumvi_room1_eval.txt"
